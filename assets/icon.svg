<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- sunup app icon: the robin at sunup, square full-bleed for Slack. -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fef7ea"/>
      <stop offset="1" stop-color="#f7d9a4"/>
    </linearGradient>
    <clipPath id="body"><ellipse cx="0" cy="22" rx="18" ry="15"/></clipPath>
  </defs>

  <rect width="1024" height="1024" fill="url(#sky)"/>

  <!-- rays -->
  <g stroke="#f2b544" stroke-width="30" stroke-linecap="round">
    <line x1="512" y1="350" x2="512" y2="264"/>
    <line x1="330" y1="428" x2="268" y2="366"/>
    <line x1="694" y1="428" x2="756" y2="366"/>
    <line x1="178" y1="608" x2="92" y2="586"/>
    <line x1="846" y1="608" x2="932" y2="586"/>
  </g>

  <!-- rising sun -->
  <path d="M 202 740 A 310 310 0 0 1 822 740 Z" fill="#f2a33c"/>

  <!-- horizon -->
  <line x1="76" y1="740" x2="948" y2="740" stroke="#3d3a34" stroke-width="30" stroke-linecap="round"/>

  <!-- robin, scaled up from the wordmark logo, feet on the horizon -->
  <g transform="translate(250 546) scale(4.2)">
    <line x1="-4" y1="34" x2="-4" y2="46" stroke="#3d3a34" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="5" y1="34" x2="5" y2="46" stroke="#3d3a34" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M -12 16 L -34 26 L -28 32 L -10 26 Z" fill="#4a4640"/>
    <ellipse cx="0" cy="22" rx="18" ry="15" fill="#4a4640"/>
    <circle cx="11" cy="31" r="15" fill="#d95d39" clip-path="url(#body)"/>
    <circle cx="12" cy="6" r="10" fill="#4a4640"/>
    <path d="M 16 -1 A 10 10 0 0 1 21 11 L 12 8 Z" fill="#d95d39"/>
    <path d="M 21 4 L 31 7 L 21 10 Z" fill="#e8a33d"/>
    <circle cx="13" cy="3.5" r="1.9" fill="#fffdf7"/>
  </g>
</svg>
